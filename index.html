<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Audio Visualizer</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
</head>
<body>
    <div class="vz-wrapper">
        <div class="title">MrGato y sus putas</div>
        <audio id="myAudio" src="musica/donki.mp3"></audio>
        <div class="names-list">
            <h2>Nuestro Staff</h2>
            <ul class="name-list"> 
                <li data-steam-id="76561198276290372"></li>
                <li data-steam-id="76561198099476831">Nombre2</li>
                <li data-steam-id="76561198083800638">Nombre3</li>
                <!-- Agrega más nombres según sea necesario -->
            </ul>
        </div>
        <div class="vz-wrapper -canvas">
            <canvas id="myCanvas" width="600" height="600"></canvas>
        </div>
    </div>
    <!-- Include the minimal-audio-visualizer.js script -->
    <script src="main.js"></script>
    <script src="custom-script.js"></script>
    <!-- Additional scripts if needed -->
</body>
</html>
