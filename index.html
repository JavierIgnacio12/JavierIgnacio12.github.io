<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Audio Visualizer</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
</head>
<body>
    <div class="vz-wrapper">
        <div class="title">[Multimod] MrGato y sus putas</div>
        <!-- <audio id="myAudio1" class="audio-element" src="musica/donki.mp3"></audio>
        <audio id="myAudio2" class="audio-element" src="musica/avalanche.mp3"></audio> -->
        
        <div class="names-list">
            <h2>Nuestro Staff</h2>
            <h3>Admins</h3>
            <ul class="name-list"> 
                <li data-steam-id="76561198276290372">Nombre1</li>
                <li data-steam-id="76561198099476831">Nombre2</li>
                <li data-steam-id="76561198083800638">Nombre3</li>
                <li data-steam-id="76561198096611688">Nombre4</li>
                <!-- Agrega más nombres según sea necesario -->
            </ul>
            <h3>Mods</h3>
            <ul class="name-list"> 
                <li data-steam-id="76561198168547190">Nombre1</li>
                <li data-steam-id="76561198167860657"></li>
                <li data-steam-id="76561198123334939"></li>
                <li data-steam-id=""></li>
                <!-- Agrega más nombres según sea necesario -->
        </div>
        <div class="vz-wrapper">
            <audio id="myAudio1" src="musica/donki.mp3" data-author="Beethoven" data-title="Allegro"></audio>
            <div class="volume-control">
                <label for="volume-slider">Volumen:</label>
                <input type="range" id="volume-slider" min="0" max="100" value="0.1">
            </div>
            <div class="vz-wrapper -canvas" style="width: 90%; height: 100%;">
                <canvas id="myCanvas" width="1920" height="1080"></canvas>
            </div>
        </div>
    </div>
    <!-- Include the minimal-audio-visualizer.js script -->
    <script src="main.js"></script>
    <script src="visualizer.js"></script>
    <!-- Additional scripts if needed -->
</body>
</html>
